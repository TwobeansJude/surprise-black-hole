<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Jude ZHAO Gravity Mystery V13.2</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <style>
        :root { --bg: #000; --blue: #00d4ff; --pink: #ff007f; --warning: #ff1100; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: var(--bg); font-family: 'Arial Black', sans-serif; -webkit-tap-highlight-color: transparent; }
        
        #game-wrapper { width: 100%; height: 100%; position: absolute; transition: transform 0.1s; z-index: 1; }
        
        #hud { position: absolute; top: 40px; width: 100%; text-align: center; pointer-events: none; z-index: 10; }
        #score-box { color: #fff; font-size: 3rem; font-weight: 900; text-shadow: 0 0 20px var(--blue); }

        #big-alert { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0);
            font-size: 40vh; font-weight: 900; color: var(--warning); 
            opacity: 0; pointer-events: none; z-index: 50; 
            text-shadow: 0 0 50px var(--warning), 0 0 100px var(--warning);
        }

        .glitch-active { animation: glitch-anim 0.4s ease-out forwards; }
        .alert-active { animation: alert-anim 0.4s ease-out forwards; }

        @keyframes glitch-anim {
            0% { transform: scale(1); filter: hue-rotate(0deg) brightness(2) invert(0); }
            50% { transform: scale(1.6); filter: hue-rotate(270deg) brightness(6) invert(1); }
            100% { transform: scale(1); filter: hue-rotate(360deg) brightness(1) invert(0); }
        }

        @keyframes alert-anim {
            0% { transform: translate(-50%, -50%) scale(0); opacity: 0; }
            30% { transform: translate(-50%, -50%) scale(1.5); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(1.2); opacity: 0; }
        }
        
        #watermark { position: absolute; bottom: 15px; right: 20px; color: white; opacity: 0.1; font-size: 12px; pointer-events: none; }
        
        /* 移动端优化 */
        @media (max-width: 768px) {
            #score-box { font-size: 2rem; }
        }
        
        /* 隐藏启动页相关元素 */
        .overlay, #start-btn, #start-overlay {
            display: none !important;
        }

        /* 玩法提示 - 精简版 */
        #game-tip {
            position: absolute;
            bottom: 30px;
            left: 20px;
            right: 20px;
            color: rgba(255,255,255,0.9);
            font-size: 14px;
            pointer-events: none;
            z-index: 20;
            text-align: center;
            text-shadow: 0 0 15px var(--blue);
            background: rgba(0,0,0,0.6);
            padding: 12px 20px;
            border-radius: 30px;
            border: 1px solid var(--blue);
            backdrop-filter: blur(3px);
            font-family: 'Arial', sans-serif;
            letter-spacing: 0.5px;
            max-width: 90%;
            margin: 0 auto;
        }
    </style>
</head>
<body>

<div id="hud"><div id="score-box">0</div></div>
<div id="big-alert">!</div>

<!-- 精简玩法提示 - 一句话 -->
<div id="game-tip">⚡ 点击/长按召唤黑洞吞噬同色小球 ⚡</div>

<div id="game-wrapper">
    <div id="game-container"></div>
</div>

<div id="watermark">Jude ZHAO</div>

<script>
const { Engine, Render, Runner, Bodies, Composite, Body, Vector, Events } = Matter;
const engine = Engine.create({ gravity: { x: 0, y: 0 } });
let score = 0, isPressing = false, mousePos = { x: 0, y: 0 }, balls = [];
const COLORS = { blue: '#00d4ff', green: '#00f260', red: '#ff5f6d', purple: '#9d50bb', orange: '#ffb347' };

// 音频系统 - 移动端优化版
const AudioEngine = {
    ctx: null,
    init: function() {
        try {
            if (!this.ctx) {
                this.ctx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (this.ctx.state === 'suspended') {
                this.ctx.resume();
            }
        } catch (e) { console.error("Audio init error", e); }
    },
    playTone(f, d, v, type='sine') {
        if (!this.ctx || this.ctx.state !== 'running') return;
        const o = this.ctx.createOscillator();
        const g = this.ctx.createGain();
        o.type = type;
        o.frequency.setValueAtTime(f, this.ctx.currentTime);
        g.gain.setValueAtTime(v, this.ctx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + d);
        o.connect(g); g.connect(this.ctx.destination);
        o.start(); o.stop(this.ctx.currentTime + d);
    },
    boom() {
        this.playTone(55, 1.2, 0.6, 'triangle');
        this.playTone(110, 0.7, 0.3, 'sawtooth');
    },
    fusion() {
        this.playTone(990, 0.1, 0.06);
    }
};

// 根据设备类型设置参数
const isMobile = window.innerWidth <= 768;

// 移动端参数 - 小球数量翻倍
const MOBILE_PARAMS = {
    GRAVITY_RANGE: 600,        // 引力范围
    GRAVITY_FORCE: 0.003,      // 引力强度
    MERGE_RANGE: 100,          // 合并范围
    GROWTH_FACTOR: 1.08,       // 合并增长系数
    BALL_SIZE_MIN: 3,           // 最小球大小
    BALL_SIZE_MAX: 7,           // 最大球大小
    INIT_SPEED: 1.2,            // 初始速度
    FRICTION_AIR: 0.04,         // 空气阻力
    GENERATE_INTERVAL: 75,      // 生成间隔(ms) - 从150减半到75，实现数量翻倍
    MAX_BALLS: 200,              // 最大球数量 - 从100翻倍到200
    MERGE_SCORE: 100,           // 合并得分
    EXPLOSION_THRESHOLD: 3      // 爆炸阈值(屏幕宽度的几分之一)
};

// 电脑端参数（保持原版）
const PC_PARAMS = {
    GRAVITY_RANGE: 1200,
    GRAVITY_FORCE: 0.009,
    MERGE_RANGE: 165,
    GROWTH_FACTOR: 1.16,
    BALL_SIZE_MIN: 8,
    BALL_SIZE_MAX: 18,
    INIT_SPEED: 7,
    FRICTION_AIR: 0.01,
    GENERATE_INTERVAL: 75,
    MAX_BALLS: 165,
    MERGE_SCORE: 250,
    EXPLOSION_THRESHOLD: 6      // 电脑端保持1/6屏幕
};

// 选择当前参数
const PARAMS = isMobile ? MOBILE_PARAMS : PC_PARAMS;

// 立即启动游戏
window.onload = function() {
    AudioEngine.init();
    boot();
};

function boot() {
    const render = Render.create({
        element: document.getElementById('game-container'),
        engine: engine,
        options: { 
            width: window.innerWidth, 
            height: window.innerHeight, 
            wireframes: false, 
            background: 'transparent' 
        }
    });
    Render.run(render);
    Runner.run(Runner.create(), engine);

    Events.on(engine, 'beforeUpdate', () => {
        // 爆炸阈值：手机端1/3，电脑端1/6
        const LIMIT = isMobile ? window.innerWidth / 3 : window.innerWidth / 6;
        
        if (isPressing) {
            balls.forEach(b => {
                const d = Vector.sub(mousePos, b.position);
                const dist = Vector.magnitude(d);
                if (dist < PARAMS.GRAVITY_RANGE) {
                    Body.applyForce(b, b.position, Vector.mult(Vector.normalise(d), PARAMS.GRAVITY_FORCE * b.mass));
                    b.frictionAir = dist < 60 ? 0.3 : PARAMS.FRICTION_AIR;
                }
                
                if (b.circleRadius > LIMIT && !b.isExploding) {
                    b.isExploding = true;
                    triggerSurprise(b);
                }
            });

            // 核心区域合并逻辑
            const inCenter = balls.filter(b => !b.isDel && Vector.magnitude(Vector.sub(b.position, mousePos)) < PARAMS.MERGE_RANGE);
            const groups = new Map();
            inCenter.forEach(b => {
                const list = groups.get(b.label) || [];
                list.push(b);
                groups.set(b.label, list);
            });

            groups.forEach(list => {
                if(list.length > 1) {
                    AudioEngine.fusion();
                    let main = list.reduce((a, b) => a.circleRadius > b.circleRadius ? a : b);
                    let area = list.reduce((s, b) => s + b.circleRadius * b.circleRadius, 0);
                    resizeBall(main, Math.sqrt(area) * PARAMS.GROWTH_FACTOR);
                    list.forEach(b => { if(b !== main) removeBall(b); });
                    score += PARAMS.MERGE_SCORE;
                    document.getElementById('score-box').innerText = score;
                }
            });
        }
    });

    // 根据设备调整生成频率
    setInterval(() => { if(balls.length < PARAMS.MAX_BALLS) spawn(); }, PARAMS.GENERATE_INTERVAL);
}

function triggerSurprise(b) {
    AudioEngine.boom();
    score += 9999;
    document.getElementById('score-box').innerText = score;

    const wrapper = document.getElementById('game-wrapper');
    wrapper.classList.remove('glitch-active');
    void wrapper.offsetWidth;
    wrapper.classList.add('glitch-active');

    const alert = document.getElementById('big-alert');
    alert.classList.remove('alert-active');
    void alert.offsetWidth;
    alert.classList.add('alert-active');

    removeBall(b);
}

function spawn() {
    const side = Math.floor(Math.random() * 4);
    let x, y, vx=0, vy=0, s = PARAMS.INIT_SPEED;
    if (side === 0) { x = Math.random()*innerWidth; y = -30; vy = s; }
    else if (side === 1) { x = Math.random()*innerWidth; y = innerHeight+30; vy = -s; }
    else if (side === 2) { x = -30; y = Math.random()*innerHeight; vx = s; }
    else { x = innerWidth+30; y = Math.random()*innerHeight; vx = -s; }
    
    const type = Object.keys(COLORS)[Math.floor(Math.random()*5)];
    // 根据设备调整小球大小
    const r = PARAMS.BALL_SIZE_MIN + Math.random() * (PARAMS.BALL_SIZE_MAX - PARAMS.BALL_SIZE_MIN);
    const b = Bodies.circle(x, y, r, { 
        label: type, 
        render: { fillStyle: COLORS[type] },
        restitution: isMobile ? 0.5 : 0.6,
        friction: isMobile ? 0.3 : 0.1,
        frictionAir: PARAMS.FRICTION_AIR
    });
    b.circleRadius = r;
    Body.setVelocity(b, {x: vx, y: vy});
    balls.push(b);
    Composite.add(engine.world, b);
}

function resizeBall(body, newR) {
    if (!body || body.isDel) return;
    const s = newR / body.circleRadius;
    Body.scale(body, s, s);
    body.circleRadius = newR;
}

function removeBall(b) {
    b.isDel = true;
    Composite.remove(engine.world, b);
    const idx = balls.indexOf(b);
    if (idx > -1) balls.splice(idx, 1);
}

// ========== 触摸交互 ==========
const updatePos = (e) => {
    e.preventDefault();
    const p = e.touches ? e.touches[0] : e;
    if (p) {
        mousePos.x = p.clientX; 
        mousePos.y = p.clientY;
    }
};

const handleStart = (e) => { 
    e.preventDefault();
    AudioEngine.init();
    isPressing = true; 
    updatePos(e); 
};

const handleMove = (e) => {
    e.preventDefault();
    if (isPressing) {
        updatePos(e);
    }
};

const handleEnd = (e) => {
    e.preventDefault();
    isPressing = false;
};

window.addEventListener('mousedown', handleStart);
window.addEventListener('mousemove', handleMove);
window.addEventListener('mouseup', handleEnd);

window.addEventListener('touchstart', handleStart, { passive: false });
window.addEventListener('touchmove', handleMove, { passive: false });
window.addEventListener('touchend', handleEnd, { passive: false });
window.addEventListener('touchcancel', handleEnd, { passive: false });

window.addEventListener('resize', () => {
    if (engine.render) {
        engine.render.canvas.width = window.innerWidth;
        engine.render.canvas.height = window.innerHeight;
        engine.render.options.width = window.innerWidth;
        engine.render.options.height = window.innerHeight;
    }
    // 刷新页面以应用新参数（当屏幕旋转时）
    location.reload();
});

</script>
</body>
</html>
